<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dogbench — AI Agent Token Benchmarks</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;background:#111;color:#eee}
  h1{color:#4ade80;margin-bottom:4px}
  h2{margin:24px 0 12px;color:#e2e8f0}
  .muted{color:#64748b;font-size:.85em}
  a{color:#60a5fa;text-decoration:none}
  table{width:100%;border-collapse:collapse;margin:12px 0}
  th,td{padding:10px 14px;text-align:right;border-bottom:1px solid #1e293b;font-size:.92em}
  th{color:#64748b;font-weight:600;font-size:.8em;text-transform:uppercase}
  td:first-child,th:first-child{text-align:left}
  .green{color:#4ade80}.red{color:#ef4444}.yellow{color:#f59e0b}
  .bar{background:#1e293b;border-radius:3px;height:5px;margin-top:4px}
  .bar-inner{height:100%;border-radius:3px}
  footer{margin-top:60px;padding:20px 0;border-top:1px solid #1e293b;color:#475569;font-size:13px}
  footer a{color:#475569}
</style>
</head>
<body>
<h1>🐕 dogbench</h1>
<p class="muted"><a href="https://github.com/specdog/dogbench">github.com/specdog/dogbench</a></p>

<h2>Latest Results</h2>
<table id="results">
  <tr><th>Agent</th><th>Input</th><th>Output</th><th>Total</th><th>Cost</th><th>Overhead</th></tr>
</table>
<p id="meta" class="muted"></p>

<footer>
  <a href="https://github.com/specdog">specdog</a> · 
  <a href="https://github.com/specdog/dotdog">dotdog</a> · 
  <a href="https://github.com/specdog/collar">collar</a> · 
  <a href="https://github.com/specdog/leash">leash</a> · 
  <a href="https://github.com/specdog/dogbench">dogbench</a>
  <span style="float:right">v0.2.0 · <a href="https://github.com/specdog/dogbench/blob/main/LICENSE">MIT</a></span>
</footer>

<script>
function fmt(n){return n.toLocaleString()}

fetch('results.json')
  .then(function(r){return r.json()})
  .then(function(data){
    var runs = Array.isArray(data) ? data : [data];
    var latest = runs[runs.length - 1];
    var task = latest.task_tokens || 0;
    var model = latest.model || '';

    // Find cheapest and most expensive (exclude 0-token entries)
    var valid = latest.agents.filter(function(a){return a.total > 0});
    var sorted = valid.slice().sort(function(a,b){return a.total - b.total});
    var cheapest = sorted.length ? sorted[0] : null;
    var expensive = sorted.length ? sorted[sorted.length-1] : null;

    var tbl = document.getElementById('results');
    var max = 0;
    latest.agents.forEach(function(a){if(a.total > max) max = a.total});

    latest.agents.forEach(function(a){
      var isCheapest = cheapest && a.id === cheapest.id;
      var isExpensive = expensive && a.id === expensive.id && sorted.length > 1;
      var oh = task && a.input ? Math.round(a.input/task) + 'x' : '-';
      var barPct = max ? Math.round(a.total/max*100) : 0;
      var barColor = isCheapest ? '#4ade80' : isExpensive ? '#ef4444' : '#475569';

      var row = tbl.insertRow();
      row.innerHTML =
        '<td>' + a.name + (isCheapest?' ✅':'') + (isExpensive?' ❌':'') +
        '</td><td>' + fmt(a.input) +
        '</td><td>' + fmt(a.output) +
        '</td><td>' + fmt(a.total) +
        '<div class="bar"><div class="bar-inner" style="width:'+barPct+'%;background:'+barColor+'"></div></div>' +
        '</td><td>$' + a.cost.toFixed(6) +
        '</td><td>' + oh + '</td>';
    });

    document.getElementById('meta').textContent =
      runs.length + ' run(s) · ' + (latest.timestamp||'').slice(0,16) + ' · ' + model + ' · task: ' + task + 't · ' +
      sorted.length + ' agents';
  })
  .catch(function(){
    document.getElementById('results').innerHTML = '<tr><td colspan="6">No data yet. Run <code>./dogbench</code></td></tr>';
  });
</script>
</body>
</html>
