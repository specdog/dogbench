name: leaderboard
on:
  pull_request:
    branches: [main]
    paths: [results.json]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate results.json schema
        run: |
          python3 -c "
          import json, sys
          with open('results.json') as f:
              data = json.load(f)
          runs = data if isinstance(data, list) else [data]
          assert len(runs) > 0, 'empty results'
          for run in runs:
              assert 'model' in run, 'missing model'
              assert 'results' in run, 'missing results'
              assert len(run['results']) >= 1, 'need at least 1 agent'
              for aid, a in run['results'].items():
                  assert 'name' in a, f'missing name in {aid}'
                  assert 'passed' in a, f'missing passed in {aid}'
                  assert 'tests' in a, f'missing tests in {aid}'
                  assert 'avg_tokens' in a, f'missing avg_tokens in {aid}'
          print(f'Valid: {len(runs)} runs, latest model={runs[-1][\"model\"]}')
          "
  
  auto-approve:
    needs: validate
    if: startsWith(github.head_ref, 'results/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auto-approve benchmark PR
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Benchmark results validated. Merging."
          gh pr merge ${{ github.event.pull_request.number }} --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
