name: leaderboard
on:
  pull_request:
    branches: [main]
    paths: [results.json]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate results.json schema
        run: |
          python3 -c "
          import json, sys
          with open('results.json') as f:
              data = json.load(f)
          assert 'model' in data, 'missing model'
          assert 'agents' in data, 'missing agents'
          for a in data['agents']:
              assert 'name' in a, 'missing name'
              assert 'input' in a, 'missing input'
              assert 'output' in a, 'missing output'
              assert 'total' in a, 'missing total'
              assert 'cost' in a, 'missing cost'
          assert 'collar' in data, 'missing collar'
          assert 'total_tokens' in data['collar'], 'collar: missing total_tokens'
          print(f'✓ Valid: {len(data[\"agents\"])} agents, model={data[\"model\"]}')
          "
  
  auto-approve:
    needs: validate
    if: startsWith(github.head_ref, 'results/')
    runs-on: ubuntu-latest
    steps:
      - name: Auto-approve benchmark PR
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "✓ Benchmark results validated. Merging."
          gh pr merge ${{ github.event.pull_request.number }} --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
