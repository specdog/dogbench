name: leaderboard
on:
  pull_request:
    branches: [main]
    paths: [results.json]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate results.json schema
        run: |
          python3 -c "
          import json, sys
          with open('results.json') as f:
              data = json.load(f)
          runs = data if isinstance(data, list) else [data]
          assert len(runs) > 0, 'empty results'
          for run in runs:
              assert 'model' in run, 'missing model'
              assert 'agents' in run, 'missing agents'
              assert len(run['agents']) >= 1, 'need at least 1 agent'
              for a in run['agents']:
                  assert 'name' in a, 'missing name'
                  assert 'input' in a, 'missing input'
                  assert 'output' in a, 'missing output'
                  assert 'total' in a, 'missing total'
                  assert 'cost' in a, 'missing cost'
          print(f'Valid: {len(runs)} runs, latest model={runs[-1][\"model\"]}')
          "
  
  auto-approve:
    needs: validate
    if: startsWith(github.head_ref, 'results/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auto-approve benchmark PR
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Benchmark results validated. Merging."
          gh pr merge ${{ github.event.pull_request.number }} --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
